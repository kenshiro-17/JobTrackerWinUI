<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A8D5E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B5E8C3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="briefcaseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A4A68;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" />
  
  <!-- Briefcase Body -->
  <rect x="100" y="180" width="312" height="200" rx="24" ry="24" fill="url(#briefcaseGrad)" />
  
  <!-- Briefcase Handle -->
  <path d="M180 180 L180 140 Q180 110 210 110 L302 110 Q332 110 332 140 L332 180" 
        fill="none" stroke="#1A1A2E" stroke-width="28" stroke-linecap="round" />
  
  <!-- Briefcase Clasp/Center Line -->
  <rect x="230" y="250" width="52" height="60" rx="8" ry="8" fill="#A8D5E5" />
  
  <!-- Check Mark (success indicator) -->
  <circle cx="390" cy="140" r="55" fill="#B5E8C3" stroke="#fff" stroke-width="8" />
  <path d="M360 140 L380 160 L420 115" 
        fill="none" stroke="#1A1A2E" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" />
</svg>
